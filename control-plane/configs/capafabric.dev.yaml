server:
  port: 8080
  admin_ui: false

registry:
  type: inmemory

state:
  type: inmemory

auth:
  provider: none

policy:
  enforcer: none

guardrails:
  enabled: false

context_management:
  enabled: false

observability:
  tracer: log
  service_name: capafabric-control-plane
  audit:
    enabled: false

load_balancing:
  strategy: round_robin
  health_check_interval_ms: 10000

health:
  heartbeat_ttl_seconds: 60
  check_interval_ms: 30000
